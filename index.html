const KEY = "drd_training_v11";
async function storageGet() {
  try {
    if (window.storage && typeof window.storage.get === "function") {
      const r = await window.storage.get(KEY);
      if (r && r.value) return JSON.parse(r.value);
    }
  } catch (e) {}
  try {
    const v = localStorage.getItem(KEY);
    if (v) return JSON.parse(v);
  } catch (e) {}
  return null;
}
async function storageSet(val) {
  try {
    if (window.storage && typeof window.storage.set === "function") {
      await window.storage.set(KEY, JSON.stringify(val));
      return;
    }
  } catch (e) {}
  try {
    localStorage.setItem(KEY, JSON.stringify(val));
  } catch (e) {}
}
function useStorage() {
  const [val, setVal] = useState({});
  const [loaded, setLoaded] = useState(false);
  useEffect(() => {
    let cancelled = false;
    storageGet()
      .then((v) => {
        if (!cancelled && v) setVal(v);
        if (!cancelled) setLoaded(true);
      })
      .catch(() => {
        if (!cancelled) setLoaded(true);
      });
    const t = setTimeout(() => {
      if (!cancelled) setLoaded(true);
    }, 2000);
    return () => {
      cancelled = true;
      clearTimeout(t);
    };
  }, []);
  const save = async (v) => {
    setVal(v);
    await storageSet(v);
  };
  return [val, save, loaded];
}

function printSection(trackTitle, moduleTitle, sec) {
  const bodyToHtml = (body) => {
    if (!body) return "";
    const paras = body.split("\n\n");
    return paras.map((para) => {
      if (para.startsWith("BULLETS:")) {
        const items = para.replace("BULLETS:", "").split("|");
        return "<ul>" + items.map((i) => "<li>" + i.trim() + "</li>").join("") + "</ul>";
      }
      if (para.startsWith("FIELDS:")) {
        const parts = para.replace("FIELDS:", "").split("|");
        let rows = "";
        for (let i = 0; i < parts.length; i += 2) {
          if (parts[i + 1]) rows += "<tr><td class='key'>" + parts[i].trim() + "</td><td>" + parts[i + 1].trim() + "</td></tr>";
        }
        return "<table><tbody>" + rows + "</tbody></table>";
      }
      if (para.startsWith("TABLE:")) {
        const rows = para.replace("TABLE:", "").split("~");
        const headers = rows[0].split("|");
        const dataRows = rows.slice(1).map((r) => r.split("|"));
        return "<table><thead><tr>" + headers.map((h) => "<th>" + h + "</th>").join("") + "</tr></thead><tbody>" +
          dataRows.map((r) => "<tr>" + r.map((c) => "<td>" + c + "</td>").join("") + "</tr>").join("") + "</tbody></table>";
      }
      return "<p>" + para + "</p>";
    }).join("");
  };
  const highlightHtml = sec.highlight
    ? (sec.highlight.startsWith("BULLETS:")
        ? "<ul class='highlight'>" + sec.highlight.replace("BULLETS:", "").split("|").map((i) => "<li>" + i.trim() + "</li>").join("") + "</ul>"
        : "<p class='highlight'>" + sec.highlight + "</p>")
    : "";
  const win = window.open("", "_blank");
  win.document.write(`<!DOCTYPE html><html><head><title>${sec.heading} — ${moduleTitle}</title><style>
    body{font-family:system-ui,sans-serif;padding:40px;max-width:700px;margin:0 auto;color:#1a1a1a}

    .highlight{background:#f5f0ff;border-left:3px solid #9333ea;padding:10px 14px;border-radius:4px;font-size:13px;margin-top:16px;font-style:italic}
    .highlight li{margin-bottom:2px}
    .footer{margin-top:28px;font-size:11px;color:#aaa;border-top:1px solid #eee;padding-top:12px}
    @media print{body{padding:20px}}
  </style></head><body>
    <div class="track">${trackTitle}</div>
    <div class="module">${moduleTitle}</div>
    <h1>${sec.heading}</h1>
    ${bodyToHtml(sec.body)}
    ${highlightHtml}
    <div class="footer">DrDoctor Integrations Training</div>
  </body></html>`);
  win.document.close();
  setTimeout(() => win.print(), 400);
}

function renderBody(body, mc) {
  mc = mc || VI;
  if (body.startsWith("TABLE:")) {
    const rows = body.replace("TABLE:", "").split("~");
    const headers = rows[0].split("|");
    const dataRows = rows.slice(1).map((r) => r.split("|"));
    const badge = (val) => {
      const v = val.trim();
      if (v === "Required") return { bg: "#e8f5e9", color: "#1a5c2a", border: "#81c784", weight: 700 };
      if (v === "Optional") return { bg: "#fff8e1", color: "#7a5800", border: "#f0c040", weight: 600 };
      return { bg: "transparent", color: "#bbb", border: "transparent", weight: 400 };
    };
    return (
      <div style={{ marginBottom: 12, overflowX: "auto" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
          <thead>
            <tr>
              {headers.map((h, i) => (
                <th
                  key={i}
                  style={{
                    background: "#f0ede8",
                    padding: "7px 10px",
                    textAlign: i === 0 ? "left" : "center",
                    fontWeight: 700,
                    color: "#1a1a1a",
                    fontSize: 11,
                    border: "1px solid #e0ddd5",
                    whiteSpace: "nowrap",
                  }}
                >
                  {h.trim()}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {dataRows.map((row, ri) => (
              <tr key={ri} style={{ background: ri % 2 === 0 ? "#fff" : "#fafaf8" }}>
                {row.map((cell, ci) => {
                  const s = badge(cell);
                  return (
                    <td
                      key={ci}
                      style={{
                        padding: "7px 10px",
                        border: "1px solid #e8e5e0",
                        textAlign: ci === 0 ? "left" : "center",
                        fontSize: ci === 0 ? 12 : 11,
                        fontWeight: ci === 0 ? 600 : 400,
                        color: ci === 0 ? "#1a1a1a" : s.color,
                      }}
                    >
                      {ci === 0 ? (
                        cell.trim()
                      ) : (
                        <span
                          style={{
                            background: s.bg,
                            border: `1px solid ${s.border}`,
                            borderRadius: 4,
                            padding: "2px 8px",
                            fontWeight: s.weight,
                            display: "inline-block",
                          }}
                        >
                          {cell.trim()}
                        </span>
                      )}
                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    );
  }
  if (body.startsWith("BULLETS:")) {
    const items = body.replace("BULLETS:", "").split("|");
    return (
      <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 12 }}>
        {items.map((item, i) => (
          <div key={i} style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
            <span style={{ color: mc, fontSize: 14, flexShrink: 0, marginTop: 1 }}>•</span>
            <span style={{ fontSize: 13, color: "#333", lineHeight: 1.6 }}>{item.trim()}</span>
          </div>
        ))}
      </div>
    );
  }
  if (body.startsWith("FIELDS:")) {
    const parts = body.replace("FIELDS:", "").split("|");
    const pairs = [];
    let trailingNote = null;
    for (let i = 0; i < parts.length; i += 2) {
      if (parts[i + 1]) {
        const val = parts[i + 1];
        if (i + 2 >= parts.length) {
          const nnIdx = val.indexOf("\n\n");
          if (nnIdx > -1) {
            pairs.push([parts[i], val.slice(0, nnIdx)]);
            trailingNote = val.slice(nnIdx + 2);
          } else {
            pairs.push([parts[i], val]);
          }
        } else {
          pairs.push([parts[i], val]);
        }
      }
    }
    return (
      <div style={{ marginBottom: 12 }}>
        <div style={{ display: "flex", flexDirection: "column", gap: 4, marginBottom: trailingNote ? 10 : 0 }}>
          {pairs.map(([f, d], i) => (
            <div
              key={i}
              style={{
                display: "flex",
                borderRadius: 7,
                overflow: "hidden",
                border: "1px solid #e8e5e0",
              }}
            >
              <div
                style={{
                  background: "#f0ede8",
                  padding: "6px 10px",
                  fontSize: 12,
                  fontWeight: 600,
                  color: "#1a1a1a",
                  minWidth: 160,
                  flexShrink: 0,
                  lineHeight: 1.4,
                }}
              >
                {f.trim()}
              </div>
              <div
                style={{
                  background: "#fff",
                  padding: "6px 10px",
                  fontSize: 12,
                  color: "#444",
                  lineHeight: 1.5,
                  flex: 1,
                }}
              >
                {d.trim()}
              </div>
            </div>
          ))}
        </div>
        {trailingNote && (
          <p style={{ color: "#555", lineHeight: 1.7, fontSize: 12, margin: 0, padding: "4px 2px", fontStyle: "italic" }}>
            {trailingNote}
          </p>
        )}
      </div>
    );
  }
  if (body.startsWith("FLAGS:")) {
    const parts = body.replace("FLAGS:", "").split("|");
    const pairs = [];
    for (let i = 0; i < parts.length; i += 2)
      if (parts[i + 1]) pairs.push([parts[i], parts[i + 1]]);
    const fc = { 0: GR, 1: BL, 2: G, 3: TE, 9: CO };
    return (
      <div style={{ display: "flex", flexDirection: "column", gap: 5, marginBottom: 12 }}>
        {pairs.map(([flag, desc], i) => (
          <div key={i} style={{ display: "flex", gap: 10, alignItems: "center" }}>
            <div
              style={{
                minWidth: 28,
                height: 24,
                borderRadius: 6,
                background: fc[flag.trim()] || GR,
                display: "flex",
                alignItems: "center",
                justifyContent: "center",
                fontSize: 12,
                fontWeight: 700,
                color: "#fff",
                flexShrink: 0,
              }}
            >
              {flag.trim()}
            </div>
            <span style={{ fontSize: 13, color: "#333", lineHeight: 1.5 }}>{desc.trim()}</span>
          </div>
        ))}
      </div>
    );
  }
  const numMatches = [...body.matchAll(/\((\d+)\)\s([^(]+)/g)];
  if (numMatches.length >= 2) {
    const firstIdx = body.indexOf("(1)");
    const intro = firstIdx > 0 ? body.slice(0, firstIdx).trim() : null;
    return (
      <div style={{ marginBottom: 12 }}>
        {intro && (
          <p style={{ color: "#333", lineHeight: 1.7, fontSize: 13, margin: "0 0 10px" }}>
            {intro}
          </p>
        )}
        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          {numMatches.map((m, i) => (
            <div key={i} style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
              <div
                style={{
                  minWidth: 22,
                  height: 22,
                  borderRadius: "50%",
                  background: "#e0ddd5",
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "center",
                  fontSize: 11,
                  fontWeight: 700,
                  color: "#555",
                  flexShrink: 0,
                  marginTop: 1,
                }}
              >
                {m[1]}
              </div>
              <p style={{ color: "#333", lineHeight: 1.6, fontSize: 13, margin: 0 }}>
                {m[2].trim().replace(/\.?\s*$/, ".")}
              </p>
            </div>
          ))}
        </div>
      </div>
    );
  }
  if (body.includes("\n\n")) {
    return (
      <div style={{ marginBottom: 12 }}>
        {body.split("\n\n").map((para, i) => {
          if (para.startsWith("FIELDS:")) return <React.Fragment key={i}>{renderBody(para, mc)}</React.Fragment>;
          if (para.startsWith("BULLETS:")) {
            const items = para.replace("BULLETS:", "").split("|");
            return (
              <div
                key={i}
                style={{ display: "flex", flexDirection: "column", gap: 6, margin: "8px 0" }}
              >
                {items.map((item, j) => (
                  <div key={j} style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
                    <span style={{ color: mc, fontSize: 14, flexShrink: 0, marginTop: 1 }}>•</span>
                    <span style={{ fontSize: 13, color: "#333", lineHeight: 1.6 }}>
                      {item.trim()}
                    </span>
                  </div>
                ))}
              </div>
            );
          }
          return (
            <p key={i} style={{ color: "#333", lineHeight: 1.7, fontSize: 13, margin: "0 0 10px" }}>
              {para.trim()}
            </p>
          );
        })}
      </div>
    );
  }
  return <p style={{ color: "#333", lineHeight: 1.7, fontSize: 13, margin: "0 0 12px" }}>{body}</p>;
}

// ── UPDATED ActivityDragMatch with multi-integration support ──
function ActivityDragMatch({ onComplete }) {
  const products = [
    { id: "dm",            label: "Direct Messaging",                   color: PU, requires: ["demo"] },
    { id: "letters",       label: "Digital letters",                    color: BL, requires: ["demo"] },
    { id: "assess-adhoc",  label: "Assessments (ad-hoc)",               color: GR, requires: ["demo"] },
    { id: "pifu",          label: "PIFU",                               color: CO, requires: ["demo", "wait"] },
    { id: "video",         label: "Integrated video consultations",     color: CY, requires: ["demo", "appt"] },
    { id: "notif",         label: "Appointment notifications",          color: TE, requires: ["demo", "appt"] },
    { id: "assess-clinic", label: "Assessments (pre/post-clinic)",      color: VI, requires: ["demo", "appt"] },
    { id: "reschedule",    label: "Appointment slot rescheduling",      color: PI, requires: ["demo", "appt", "slot"] },
    { id: "booking",       label: "Patient-led booking",                color: G,  requires: ["demo", "appt", "slot", "wait"] },
  ];
  const targets = [
    { id: "demo", label: "Demographics integration",   icon: "👤" },
    { id: "appt", label: "Appointment integration",    icon: "📅" },
    { id: "slot", label: "Slot integration",           icon: "🕐" },
    { id: "wait", label: "Waiting list integration",   icon: "📋" },
  ];
  const [placed, setPlaced] = useState({});
  const [dragging, setDragging] = useState(null);
  const [wrong, setWrong] = useState(null);
  const [done, setDone] = useState(false);

  const isComplete = (p) =>
    (placed[p.id] || new Set()).size === p.requires.length &&
    p.requires.every((r) => (placed[p.id] || new Set()).has(r));
  const allCorrect = products.every(isComplete);

  useEffect(() => {
    if (allCorrect && !done) {
      setDone(true);
      setTimeout(() => onComplete(), 600);
    }
  }, [placed]);

  const drop = (tid) => {
    if (!dragging) return;
    const p = products.find((p) => p.id === dragging);
    const alreadyPlaced = (placed[dragging] || new Set()).has(tid);
    if (alreadyPlaced) {
      setDragging(null);
      return;
    }
    if (p.requires.includes(tid)) {
      setPlaced((prev) => {
        const next = { ...prev };
        next[dragging] = new Set([...(prev[dragging] || []), tid]);
        return next;
      });
    } else {
      setWrong({ productId: dragging, targetId: tid });
      setTimeout(() => setWrong(null), 700);
    }
    setDragging(null);
  };

  const inProgress = products.filter((p) => !isComplete(p));

  return (
    <div>
      <p style={{ fontSize: 13, color: GR, marginBottom: 6, lineHeight: 1.6 }}>
        Drag each DrDoctor product to <strong>every</strong> integration it needs. Some products
        need more than one.
      </p>
      <div
        style={{
          background: "#f0f4ff",
          border: "1px solid " + BL + "44",
          borderRadius: 8,
          padding: "8px 12px",
          fontSize: 12,
          color: BL,
          marginBottom: 16,
          lineHeight: 1.6,
        }}
      >
        💡 Keep dragging a product to multiple drop zones until it disappears from the tray.
      </div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 20, minHeight: 48 }}>
        {inProgress.map((p) => {
          const placedCount = (placed[p.id] || new Set()).size;
          return (
            <div
              key={p.id}
              draggable
              onDragStart={() => setDragging(p.id)}
              style={{
                background: wrong && wrong.productId === p.id ? CL : p.color,
                color: wrong && wrong.productId === p.id ? CO : "#fff",
                borderRadius: 8,
                padding: "8px 16px",
                fontSize: 13,
                fontWeight: 600,
                cursor: "grab",
                userSelect: "none",
                position: "relative",
                border: wrong && wrong.productId === p.id ? "1.5px solid " + CO : "none",
                opacity: wrong && wrong.productId === p.id ? 0.7 : 1,
              }}
            >
              {p.label}
              {placedCount > 0 && (
                <span
                  style={{
                    position: "absolute",
                    top: -6,
                    right: -6,
                    background: "#fff",
                    color: p.color,
                    borderRadius: 99,
                    fontSize: 10,
                    fontWeight: 700,
                    padding: "1px 5px",
                    border: "1.5px solid " + p.color,
                  }}
                >
                  {placedCount}/{p.requires.length}
                </span>
              )}
            </div>
          );
        })}
        {inProgress.length === 0 && <div style={{ fontSize: 12, color: TE }}>All placed! ✓</div>}
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {targets.map((t) => {
          const placedHere = products.filter((p) => (placed[p.id] || new Set()).has(t.id));
          const isWrongTarget = wrong && wrong.targetId === t.id;
          return (
            <div
              key={t.id}
              onDragOver={(e) => e.preventDefault()}
              onDrop={() => drop(t.id)}
              style={{
                border: "2px dashed " + (isWrongTarget ? CO : "#ccc"),
                borderRadius: 10,
                padding: "12px 16px",
                minHeight: 60,
                background: isWrongTarget ? CL : placedHere.length > 0 ? "#f8f8f6" : "#fff",
              }}
            >
              <div
                style={{
                  fontSize: 12,
                  color: GR,
                  fontWeight: 600,
                  marginBottom: placedHere.length > 0 ? 8 : 0,
                }}
              >
                {t.icon} {t.label}
              </div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                {placedHere.map((p) => (
                  <div
                    key={p.id}
                    style={{
                      background: p.color,
                      color: "#fff",
                      borderRadius: 7,
                      padding: "4px 12px",
                      fontSize: 12,
                      fontWeight: 600,
                    }}
                  >
                    ✓ {p.label}
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>
      {wrong && (
        <div
          style={{
            marginTop: 10,
            background: CL,
            border: "1px solid " + CO,
            borderRadius: 8,
            padding: "8px 12px",
            fontSize: 12,
            color: CO,
          }}
        >
          That integration isn't needed for that product — check the learn tab.
        </div>
      )}
      <div style={{ marginTop: 14, display: "flex", flexDirection: "column", gap: 4 }}>
        {products.map((p) => {
          const done_p = isComplete(p);
          const placedCount = (placed[p.id] || new Set()).size;
          return (
            <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12 }}>
              <div
                style={{
                  width: 10,
                  height: 10,
                  borderRadius: "50%",
                  background: done_p ? G : placedCount > 0 ? p.color : "#ddd",
                  flexShrink: 0,
                }}
              />
              <span
                style={{
                  color: done_p ? G : placedCount > 0 ? p.color : GR,
                  fontWeight: done_p ? 600 : 400,
                }}
              >
                {p.label}:{" "}
                {done_p
                  ? "complete ✓"
                  : placedCount === 0
                    ? "not started"
                    : placedCount + "/" + p.requires.length + " integrations placed"}
              </span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function ScenarioActivity({ scenarios, accentColor, onComplete }) {
  const [idx, setIdx] = useState(0);
  const [selected, setSelected] = useState(null);
  const [results, setResults] = useState([]);
  const [answered, setAnswered] = useState(false);
  const [done, setDone] = useState(false);
  const cur = scenarios[idx];
  const answer = (i) => {
    if (answered) return;
    setSelected(i);
    setAnswered(true);
    setResults((r) => [...r, { correct: i === cur.correct }]);
  };
  const next = () => {
    if (idx < scenarios.length - 1) {
      setIdx((i) => i + 1);
      setSelected(null);
      setAnswered(false);
    } else setDone(true);
  };
  if (done) {
    const correct = results.filter((r) => r.correct).length;
    return (
      <FeedbackSummary
        title="Scenarios complete!"
        items={[
          {
            label: "Correct",
            value: correct + "/" + scenarios.length,
            good: correct >= Math.ceil(scenarios.length * 0.8),
          },
        ]}
        onComplete={onComplete}
      />
    );
  }
  return (
    <div>
      <div style={{ display: "flex", gap: 4, marginBottom: 14 }}>
        {scenarios.map((_, i) => (
          <div
            key={i}
            style={{
              flex: 1,
              height: 3,
              borderRadius: 99,
              background: i < idx ? G : i === idx ? accentColor : "#e0ddd5",
            }}
          />
        ))}
      </div>
      <div style={{ fontSize: 11, color: GR, marginBottom: 10 }}>
        Scenario {idx + 1} of {scenarios.length}
      </div>
      <div
        style={{
          background: "#f8f8f6",
          borderRadius: 10,
          padding: "16px",
          marginBottom: 16,
          fontSize: 14,
          color: "#1a1a1a",
          fontWeight: 500,
          lineHeight: 1.6,
        }}
      >
        {cur.text}
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 12 }}>
        {cur.options.map((opt, i) => {
          let bg = "#fff",
            border = "1px solid #e0ddd5",
            color = "#333";
          if (answered && i === cur.correct) {
            bg = GL;
            border = "1.5px solid " + G;
            color = G;
          } else if (answered && i === selected && i !== cur.correct) {
            bg = CL;
            border = "1.5px solid " + CO;
            color = CO;
          } else if (!answered && selected === i) {
            bg = "#f0f4ff";
            border = "1.5px solid " + accentColor;
            color = accentColor;
          }
          return (
            <div
              key={i}
              onClick={() => answer(i)}
              style={{
                background: bg,
                border,
                borderRadius: 8,
                padding: "10px 14px",
                cursor: answered ? "default" : "pointer",
                fontSize: 13,
                color,
                fontWeight: 600,
              }}
            >
              {answered && i === cur.correct && "✓ "}
              {answered && i === selected && i !== cur.correct && "✗ "}
              {opt}
            </div>
          );
        })}
      </div>
      {answered && (
        <div
          style={{
            background: "#f4f7fb",
            borderRadius: 8,
            padding: "10px 14px",
            fontSize: 12,
            color: "#333",
            marginBottom: 14,
            lineHeight: 1.6,
          }}
        >
          {selected === cur.correct ? "✅ " : "💡 "}
          {cur.explain}
        </div>
      )}
      {answered && (
        <button
          onClick={next}
          style={{
            background: accentColor,
            color: "#fff",
            border: "none",
            borderRadius: 8,
            padding: "8px 20px",
            fontSize: 13,
            fontWeight: 600,
            cursor: "pointer",
            width: "100%",
          }}
        >
          {idx < scenarios.length - 1 ? "Next →" : "See results →"}
        </button>
      )}
    </div>
  );
}

function ActivityDragPath({ onComplete }) {

  const add = (id) => {
    if (path.includes(id)) return;
    if (id === correctOrder[path.length]) {
      const np = [...path, id];
      setPath(np);
      setAttempts((a) => ({ ...a, [id]: (a[id] || 0) + 1 }));
      if (np.length === correctOrder.length) setTimeout(() => onComplete(), 400);

      setWrong(id);
      setAttempts((a) => ({ ...a, [id]: (a[id] || 0) + 1 }));
      setTimeout(() => setWrong(null), 2000);

  const multi = Object.entries(attempts).filter(([, v]) => v > 1).length;
  const remaining = nodes.filter((n) => !path.includes(n.id));

    <div>
      <p style={{ fontSize: 13, color: GR, marginBottom: 14, lineHeight: 1.6 }}>
        Build the correct path an HL7 message travels. Tap each step in the right order.

            <span style={{ fontSize: 12, color: "#bbb" }}>Tap a step below to start...</span>

          {path.map((id, i) => {
            const n = nodes.find((n) => n.id === id);
            return (
              <div key={id} style={{ display: "flex", alignItems: "center", gap: 4 }}>
                {i > 0 && <span style={{ color: "#ccc", fontSize: 14 }}>→</span>}
                <div

                    padding: "4px 10px",

      <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 12 }}>
        {remaining.map((n) => (
          <div

          }}

  );

function DragOrderActivity({ items, accentColor, onComplete }) {
  const [order, setOrder] = useState(() => [...items].sort(() => Math.random() - 0.5));
  const [checked, setChecked] = useState(false);
  const [wrongIds, setWrongIds] = useState([]);
  const [draggingId, setDraggingId] = useState(null);
  const [dragOverId, setDragOverId] = useState(null);
  const check = () => {
    const w = order.filter((item, i) => item.id !== items[i].id).map((item) => item.id);
    setWrongIds(w);
    setChecked(true);
    if (w.length === 0) setTimeout(() => onComplete(), 400);
  };
  const dragEnd = () => {
    if (draggingId && dragOverId) {
      const f = order.findIndex((i) => i.id === draggingId);
      const t = order.findIndex((i) => i.id === dragOverId);
      const n = [...order];
      n.splice(t, 0, n.splice(f, 1)[0]);
      setOrder(n);
      setChecked(false);
      setWrongIds([]);
    }
    setDraggingId(null);
    setDragOverId(null);
  };
  return (
    <div>
      <p style={{ fontSize: 13, color: GR, marginBottom: 14, lineHeight: 1.6 }}>
        Drag the steps into the correct order. Then hit Check.
      </p>
      <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 14 }}>
        {order.map((item) => {
          const iW = checked && wrongIds.includes(item.id);
          const iR = checked && !wrongIds.includes(item.id);
          return (
            <div
              key={item.id}
              draggable
              onDragStart={() => setDraggingId(item.id)}
              onDragOver={(e) => {
                e.preventDefault();
                if (item.id !== draggingId) setDragOverId(item.id);
              }}
              onDragEnd={dragEnd}
              style={{
                background: iR ? GL : iW ? CL : dragOverId === item.id ? "#f0f4ff" : "#fff",
                border:
                  "1.5px solid " + (iR ? G : iW ? CO : dragOverId === item.id ? BL : "#e0ddd5"),
                borderRadius: 10,
                padding: "10px 14px",
                cursor: "grab",
                display: "flex",
                alignItems: "center",
                gap: 12,
                opacity: draggingId === item.id ? 0.4 : 1,
              }}
            >
              <span style={{ fontSize: 18 }}>{item.icon}</span>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: iR ? G : iW ? CO : "#1a1a1a" }}>
                  {item.label}
                </div>
                <div style={{ fontSize: 11, color: GR }}>{item.desc}</div>
              </div>
              <span style={{ fontSize: 16, color: "#ccc" }}>⠿</span>
            </div>
          );
        })}
      </div>
      {checked && wrongIds.length > 0 && (
        <div
          style={{
            background: CL,
            border: "1px solid " + CO,
            borderRadius: 8,
            padding: "8px 12px",
            fontSize: 12,
            color: CO,
            marginBottom: 10,
          }}
        >
          {wrongIds.length} step(s) in the wrong position.
        </div>
      )}
      <button
        onClick={check}
        style={{
          background: accentColor,
          color: "#fff",
          border: "none",
          borderRadius: 8,
          padding: "9px 24px",
          fontSize: 13,
          fontWeight: 600,
          cursor: "pointer",
          width: "100%",
        }}
      >
        Check my order
      </button>
    </div>
  );
}

function TrueFalseActivity({ statements, accentColor, onComplete }) {
  const [idx, setIdx] = useState(0);
  const [results, setResults] = useState([]);
  const [answered, setAnswered] = useState(false);
  const [selected, setSelected] = useState(null);
  const [done, setDone] = useState(false);
  const cur = statements[idx];
  const answer = (val) => {
    if (answered) return;
    setSelected(val);
    setAnswered(true);
    setResults((r) => [...r, { correct: val === cur.correct }]);
  };
  const next = () => {
    if (idx < statements.length - 1) {
      setIdx((i) => i + 1);
      setAnswered(false);
      setSelected(null);
    } else setDone(true);
  };
  if (done) {
    const correct = results.filter((r) => r.correct).length;
    return (
      <FeedbackSummary
        title="True or False complete!"
        items={[
          {
            label: "Correct",
            value: correct + "/" + statements.length,
            good: correct >= Math.ceil(statements.length * 0.8),
          },
        ]}
        onComplete={onComplete}
      />
    );
  }
  return (
    <div>
      <div style={{ display: "flex", gap: 4, marginBottom: 14 }}>
        {statements.map((_, i) => (
          <div
            key={i}
            style={{
              flex: 1,
              height: 3,
              borderRadius: 99,
              background: i < idx ? G : i === idx ? accentColor : "#e0ddd5",
            }}
          />
        ))}
      </div>
      <div style={{ fontSize: 11, color: GR, marginBottom: 10 }}>
        Statement {idx + 1} of {statements.length}
      </div>
      <div
        style={{
          background: "#f8f8f6",
          borderRadius: 10,
          padding: "16px",
          marginBottom: 16,
          fontSize: 14,
          color: "#1a1a1a",
          fontWeight: 500,
          lineHeight: 1.6,
        }}
      >
        {cur.text}
      </div>
      <div style={{ display: "flex", gap: 10, marginBottom: 12 }}>
        {[true, false].map((val) => {
          let bg = "#fff",
            border = "1.5px solid #e0ddd5",
            color = "#333";
          if (!answered && selected === val) {
            bg = "#f0f4ff";
            border = "1.5px solid " + accentColor;
            color = accentColor;
          }
          if (answered && val === cur.correct) {
            bg = GL;
            border = "1.5px solid " + G;
            color = G;
          }
          if (answered && val === selected && val !== cur.correct) {
            bg = CL;
            border = "1.5px solid " + CO;
            color = CO;
          }
          return (
            <div
              key={String(val)}
              onClick={() => answer(val)}
              style={{
                flex: 1,
                background: bg,
                border,
                borderRadius: 8,
                padding: "12px",
                textAlign: "center",
                cursor: answered ? "default" : "pointer",
                fontSize: 14,
                fontWeight: 700,
                color,
              }}
            >
              {answered && val === cur.correct
                ? "✓ "
                : answered && val === selected && val !== cur.correct
                  ? "✗ "
                  : ""}
              {val ? "True" : "False"}
            </div>
          );
        })}
      </div>
      {answered && (
        <div
          style={{
            background: "#f4f7fb",
            borderRadius: 8,
            padding: "10px 14px",
            fontSize: 12,
            color: "#333",
            marginBottom: 14,
            lineHeight: 1.6,
          }}
        >
          {selected === cur.correct ? "✅ " : "💡 "}
          {cur.explain}

    {
      id: "c",
      text: "We'll set up HSCN connectivity and agree VPN or SSL with the Trust TIE team before go-live.",
      isMistake: false,
      explain: "Correct — HL7 writeback requires HSCN and either a VPN or SSL certificate.",
    },
    {
      id: "d",
      text: "The Trust only wants assessments from one specialty sent — we've confirmed DrDoctor will filter these on our side.",
      isMistake: true,
      explain:
        "No filtering takes place on DrDoctor side — all completed assessments for the provider are sent.",
    },
    {
      id: "e",
      text: "We'll test writeback separately from the assessment product, with its own test script.",
      isMistake: false,
      explain: "Correct — writeback and product testing should always be separate tracks.",
    },
  ];
  const [found, setFound] = useState({});
  const [feedback, setFeedback] = useState(null);
  const [done, setDone] = useState(false);
  const total = items.filter((m) => m.isMistake).length;
  const cf = items.filter((m) => m.isMistake && found[m.id] === "mistake").length;
  const allFound = items.filter((m) => m.isMistake).every((m) => found[m.id] === "mistake");
  const flag = (id) => {
    if (found[id]) return;
    const m = items.find((m) => m.id === id);
    setFound((f) => ({ ...f, [id]: m.isMistake ? "mistake" : "correct" }));
    setFeedback({ id, explain: m.explain });
  };
  if (done)
    return (
      <FeedbackSummary
        title="Spot the mistake complete!"
        items={[{ label: "Mistakes found", value: cf + "/" + total, good: cf === total }]}
        onComplete={onComplete}
      />
    );
  return (
    <div>
      <p style={{ fontSize: 13, color: GR, marginBottom: 14, lineHeight: 1.6 }}>
        This HL7 writeback project plan contains mistakes. Click any step you think is wrong to flag
        it.
      </p>
      <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 14 }}>
        {items.map((m) => {
          const state = found[m.id];
          let bg = "#fff",
            border = "1px solid #e0ddd5",
            color = "#333";
          if (state === "mistake") {
            bg = GL;
            border = "1.5px solid " + G;
            color = G;
          }
          if (state === "correct") {
            bg = CL;
            border = "1.5px solid " + CO;
            color = CO;
          }
          return (
            <div
              key={m.id}
              onClick={() => flag(m.id)}
              style={{
                background: bg,
                border,
                borderRadius: 10,
                padding: "11px 14px",
                cursor: state ? "default" : "pointer",
                fontSize: 13,
                color,
                lineHeight: 1.5,
                display: "flex",
                alignItems: "center",
                gap: 10,
              }}
            >
              <span style={{ fontSize: 16, flexShrink: 0 }}>
                {state === "mistake" ? "✓" : state === "correct" ? "✗" : "🔍"}
              </span>
              <span>{m.text}</span>
            </div>
          );
        })}
      </div>
      {feedback && (
        <div
          style={{
            background: "#f4f7fb",
            borderRadius: 8,
            padding: "10px 14px",
            fontSize: 12,
            color: "#333",
            marginBottom: 14,
            lineHeight: 1.6,
          }}
        >
          💡 {feedback.explain}
        </div>
      )}
      <div style={{ fontSize: 12, color: GR, marginBottom: 10, textAlign: "center" }}>
        {cf} of {total} mistakes found
      </div>
      {allFound && (
        <button
          onClick={() => setDone(true)}
          style={{
            background: G,
            color: "#fff",
            border: "none",
            borderRadius: 8,
            padding: "8px 20px",

            fontWeight: 600,
            cursor: "pointer",
            width: "100%",

      )}
    </div>
  );
}

function ActivityHL7Matcher({ onComplete }) {
  const messages = [
    { id: "a05", label: "ADT^A05", color: BL },
    { id: "s12", label: "SIU^S12", color: BL },
    { id: "s14", label: "SIU^S14", color: PU },
    { id: "a38", label: "ADT^A38", color: CO },
    { id: "s15", label: "SIU^S15", color: CO },
    { id: "z15", label: "SIU^Z15", color: CO },
  ];
  const targets = [
    {
      id: "book-adt",
      label: "Book a new appointment (ADT-based Trust)",
      accepts: ["a05"],
      icon: "📅",
    },
    {
      id: "book-siu",
      label: "Book a new appointment (SIU-based Trust)",
      accepts: ["s12"],
      icon: "📅",
    },
    {
      id: "reschedule",
      label: "Reschedule an existing appointment (SIU)",
      accepts: ["s14"],
      icon: "🔄",
    },
    {
      id: "cancel-adt",
      label: "Cancel an appointment (ADT-based Trust)",
      accepts: ["a38"],
      icon: "❌",
    },
    {
      id: "cancel-siu",
      label: "Cancel an appointment (SIU-based, standard)",
      accepts: ["s15"],
      icon: "❌",
    },
    {
      id: "cancel-cerner",
      label: "Cancel — custom variant (e.g. Cerner Millennium)",
      accepts: ["z15"],
      icon: "❌",
    },
  ];
  const [placed, setPlaced] = useState({});
  const [dragging, setDragging] = useState(null);
  const [wrong, setWrong] = useState(null);
  const [done, setDone] = useState(false);
  const allCorrect = messages.every((m) => {
    const tgt = targets.find((t) => t.accepts.includes(m.id));
    return placed[m.id] === tgt.id;
  });
  useEffect(() => {
    if (allCorrect && !done) {
      setDone(true);
      setTimeout(() => onComplete(), 400);
    }
  }, [placed]);
  const drop = (tid) => {
    if (!dragging) return;
    const tgt = targets.find((t) => t.id === tid);
    if (tgt.accepts.includes(dragging)) {
      setPlaced((p) => ({ ...p, [dragging]: tid }));
    } else {
      setWrong(dragging);
      setTimeout(() => setWrong(null), 700);
    }
    setDragging(null);
  };
  const unplaced = messages.filter((m) => !placed[m.id]);
  return (
    <div>
      <p style={{ fontSize: 13, color: GR, marginBottom: 14, lineHeight: 1.6 }}>
        Drag each HL7 message type to the action it performs.
      </p>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 18, minHeight: 42 }}>
        {unplaced.map((m) => (
          <div
            key={m.id}
            draggable
            onDragStart={() => setDragging(m.id)}
            style={{
              background: m.color,
              color: "#fff",
              borderRadius: 8,
              padding: "8px 14px",
              fontSize: 13,
              fontWeight: 700,
              cursor: "grab",
              opacity: wrong === m.id ? 0.4 : 1,
              userSelect: "none",
              fontFamily: "monospace",
            }}
          >
            {m.label}
          </div>
        ))}
        {unplaced.length === 0 && <div style={{ fontSize: 12, color: TE }}>All placed! ✓</div>}
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {targets.map((t) => {
          const ph = messages.filter((m) => placed[m.id] === t.id);
          return (
            <div
              key={t.id}
              onDragOver={(e) => e.preventDefault()}
              onDrop={() => drop(t.id)}
              style={{
                border: "2px dashed #ccc",
                borderRadius: 10,
                padding: "10px 14px",
                minHeight: 48,
                background: ph.length > 0 ? "#f8f8f6" : "#fff",
                display: "flex",
                alignItems: "center",
                gap: 10,
              }}
            >
              <div style={{ flex: 1, fontSize: 12, color: GR, fontWeight: 600 }}>
                {t.icon} {t.label}
              </div>
              <div style={{ display: "flex", gap: 6 }}>
                {ph.map((m) => (
                  <div
                    key={m.id}
                    style={{
                      background: m.color,
                      color: "#fff",
                      borderRadius: 6,
                      padding: "4px 10px",
                      fontSize: 11,
                      fontWeight: 700,
                      fontFamily: "monospace",
                    }}
                  >
                    ✓ {m.label}
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>
      {wrong && (
        <div
          style={{
            marginTop: 10,
            background: CL,
            border: "1px solid " + CO,
            borderRadius: 8,
            padding: "8px 12px",
            fontSize: 12,
            color: CO,
          }}
        >
          That message type doesn't fit there.
        </div>
      )}
    </div>
  );
}

                  background: m.color,
                  color: "#fff",
                  border: "none",
                  borderRadius: 7,
                  padding: "6px 14px",
                  cursor: "pointer",
                  fontSize: 12,
                  fontWeight: 600,
                }}
              >
                Next →
              </button>
            ) : (
              <button
                onClick={goToNext}
                style={{
                  background: m.color,
                  color: "#fff",
                  border: "none",
                  borderRadius: 7,
                  padding: "6px 14px",
                  cursor: "pointer",
                  fontSize: 12,
                  fontWeight: 600,
                }}
              >
                {hasActivity ? "Activity →" : hasQuiz ? "Take the quiz →" : "Complete module →"}
              </button>
            )}
          </div>
        </>
      )}
      {stage === "activity" && (
        <ActivityBlock activity={m.activity} onComplete={handleActivityComplete} />
      )}
      {stage === "quiz" && hasQuiz && (
        <>
          <div
            style={{
              background: m.bg,
              borderRadius: 8,
              padding: "8px 12px",
              marginBottom: 16,
              fontSize: 12,
              color: m.color,
              fontWeight: 500,
            }}
          >
            {m.quiz.length} questions — pass with {needed} or more correct
          </div>
          {m.quiz.map((q, qi) => (
            <div
              key={qi}
              style={{
                background: "#fff",
                border: "1px solid #e0ddd5",
                borderRadius: 10,
                padding: "12px 14px",
                marginBottom: 10,
              }}
            >
              <p style={{ fontWeight: 600, fontSize: 13, margin: "0 0 9px", color: "#1a1a1a" }}>
                {qi + 1}. {q.q}
              </p>
              {q.opts.map((o, ai) => {
                let bg = "#f8f8f6",
                  bd = "1px solid #e0ddd5",
                  col = "#333";
                if (ans[qi] === ai) {
                  bg = m.bg;
                  bd = "1.5px solid " + m.color;
                  col = m.color;
                }
                if (submitted && ai === q.a) {
                  bg = GL;
                  bd = "1.5px solid " + G;
                  col = G;
                }
                if (submitted && ans[qi] === ai && ai !== q.a) {
                  bg = CL;
                  bd = "1.5px solid " + CO;
                  col = CO;
                }
                return (
                  <div
                    key={ai}
                    onClick={() => {
                      if (!submitted) setAns((a) => ({ ...a, [qi]: ai }));
                    }}
                    style={{
                      background: bg,
                      border: bd,
                      borderRadius: 7,
                      padding: "7px 11px",
                      marginBottom: 6,
                      cursor: submitted ? "default" : "pointer",
                      fontSize: 12,
                      color: col,
                      fontWeight: ans[qi] === ai ? 500 : 400,
                    }}
                  >
                    {submitted && ai === q.a ? "✓ " : ""}
                    {submitted && ans[qi] === ai && ai !== q.a ? "✗ " : ""}
                    {o}
                  </div>
                );
              })}
            </div>
          ))}
          {!submitted ? (
            <button
              onClick={() => {
                if (!unfinished) setSubmitted(true);
              }}
              disabled={unfinished}
              style={{
                background: unfinished ? "#ccc" : m.color,
                color: "#fff",
                border: "none",
                borderRadius: 8,
                padding: "10px 24px",
                fontSize: 13,
                fontWeight: 600,
                cursor: unfinished ? "not-allowed" : "pointer",
                width: "100%",
              }}
            >
              Submit answers
            </button>
          ) : (
            <div
              style={{
                background: passed ? GL : "#fff0ee",
                border: "1.5px solid " + (passed ? G : CO),
                borderRadius: 10,
                padding: "14px 16px",
                textAlign: "center",
                marginTop: 6,
              }}
            >
              <div style={{ fontSize: 18, marginBottom: 4 }}>{passed ? "🎉" : "💪"}</div>
              <div
                style={{ fontWeight: 700, color: passed ? G : CO, fontSize: 14, marginBottom: 3 }}
              >
                {passed ? "Excellent work!" : "Almost there!"} {score}/{m.quiz.length} correct
              </div>
              <div style={{ color: GR, fontSize: 12, marginBottom: 10 }}>
                {passed ? "Module complete!" : "Review the content and give it another go."}
              </div>
              <div style={{ display: "flex", gap: 8, justifyContent: "center" }}>
                {!passed && (
                  <button
                    onClick={() => {
                      setSubmitted(false);
                      setAns({});
                      setStage("learn");
                      setSi(0);
                    }}
                    style={{
                      background: "none",
                      border: "1px solid #ccc",
                      borderRadius: 7,
                      padding: "6px 14px",
                      cursor: "pointer",
                      fontSize: 12,
                    }}
                  >
                    Review content
                  </button>
                )}
                <button
                  onClick={() => {
                    if (passed || alreadyDone) setShowComplete(true);
                    else {
                      setSubmitted(false);
                      setAns({});
                    }
                  }}
                  style={{
                    background: passed ? G : CO,
                    color: "#fff",
                    border: "none",
                    borderRadius: 7,
                    padding: "6px 16px",
                    cursor: "pointer",
                    fontSize: 12,
                    fontWeight: 600,
                  }}
                >
                  {passed ? "Back to modules →" : "Try again"}
                </button>
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

function CertPage({ onBack, allDone }) {
  const [name, setName] = useState("");
  const [certImg, setCertImg] = useState(null);
  const [generating, setGenerating] = useState(false);
  const date = new Date().toLocaleDateString("en-GB", {
    day: "numeric",
    month: "long",
    year: "numeric",
  });
  const generate = () => {
    if (!name.trim()) return;
    setGenerating(true);
    try {
      const canvas = document.createElement("canvas");
      canvas.width = 1400;
      canvas.height = 990;
      const c = canvas.getContext("2d");
      const W = 1400,
        H = 990;
      c.fillStyle = "#fff";
      c.fillRect(0, 0, W, H);
      c.strokeStyle = G;
      c.lineWidth = 5;
      c.strokeRect(24, 24, W - 48, H - 48);
      [
        [0, 0, 1, 1],
        [W, 0, -1, 1],
        [0, H, 1, -1],
        [W, H, -1, -1],
      ].forEach(([ox, oy, sx, sy]) => {
        c.save();
        c.translate(ox, oy);
        c.scale(sx, sy);
        c.strokeStyle = G;
        c.lineWidth = 3;
        c.beginPath();
        c.moveTo(18, 65);
        c.lineTo(18, 18);
        c.lineTo(65, 18);
        c.stroke();
        c.fillStyle = G;
        c.globalAlpha = 0.35;
        c.beginPath();
        c.arc(18, 18, 5, 0, Math.PI * 2);
        c.fill();
        c.globalAlpha = 1;
        c.restore();
      });
      c.textAlign = "center";
      c.font = "bold 32px Arial,sans-serif";
      c.fillStyle = G;
      c.fillText("DrDoctor", W / 2, 128);
      c.font = "14px Arial,sans-serif";
      c.fillStyle = "#aaa";
      c.fillText("CERTIFICATE  OF  COMPLETION", W / 2, 200);
      c.font = "bold 52px Georgia,serif";
      c.fillStyle = "#1a1a1a";
      c.fillText("Integrations Training", W / 2, 290);
      c.font = "13px Arial,sans-serif";
      c.fillStyle = "#bbb";
      c.fillText("THIS  CERTIFIES  THAT", W / 2, 360);
      c.font = "italic bold 64px Georgia,serif";
      c.fillStyle = G;
      c.fillText(name.trim(), W / 2, 450);
      c.font = "17px Arial,sans-serif";
      c.fillStyle = "#666";
      c.fillText(
        "has successfully completed the DrDoctor Integrations Training programme,",
        W / 2,
        520,
      );
      c.fillText(
        "demonstrating knowledge of integration principles, methods, and practices.",
        W / 2,
        548,
      );
      [
        [320, "DATE", date],
        [W - 320, "ISSUED BY", "DrDoctor"],
      ].forEach(([x, label, val]) => {
        c.strokeStyle = "#ccc";
        c.lineWidth = 1;
        c.beginPath();
        c.moveTo(x - 150, 672);
        c.lineTo(x + 150, 672);
        c.stroke();
        c.font = "11px Arial,sans-serif";
        c.fillStyle = "#bbb";
        c.fillText(label, x, 692);
        c.font = "bold 15px Arial,sans-serif";
        c.fillStyle = "#333";
        c.fillText(val, x, 714);
      });
      const cx = W / 2,
        cy = 692;
      c.fillStyle = "#e8f5e9";
      c.beginPath();
      c.arc(cx, cy, 50, 0, Math.PI * 2);
      c.fill();
      c.strokeStyle = G;
      c.lineWidth = 2.5;
      c.beginPath();
      c.arc(cx, cy, 50, 0, Math.PI * 2);
      c.stroke();
      c.strokeStyle = G;
      c.lineWidth = 4;
      c.lineCap = "round";
      c.lineJoin = "round";
      c.beginPath();
      c.moveTo(cx - 18, cy + 2);
      c.lineTo(cx - 4, cy + 16);
      c.lineTo(cx + 20, cy - 14);
      c.stroke();
      setCertImg(canvas.toDataURL("image/png"));
    } catch (err) {
      console.error(err);
    }
    setGenerating(false);
  };
  const download = () => {
    if (!certImg) return;
    const a = document.createElement("a");
    a.href = certImg;
    a.download = "DrDoctor_Certificate_" + name.trim().replace(/\s+/g, "_") + ".png";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  };
  if (!allDone)
    return (
      <div
        style={{
          fontFamily: "system-ui,sans-serif",
          maxWidth: 480,
          margin: "0 auto",
          padding: "3rem 1rem",
          textAlign: "center",
        }}
      >
        <div style={{ fontSize: 32, marginBottom: 10 }}>🔒</div>
        <p style={{ color: GR }}>Complete all modules to unlock your certificate.</p>
        <button
          onClick={onBack}
          style={{
            background: "none",
            border: "1px solid #ccc",
            borderRadius: 7,
            padding: "7px 16px",
            cursor: "pointer",
            fontSize: 12,
            color: GR,
          }}
        >
          Back
        </button>
      </div>
    );
  if (certImg)
    return (
      <div
        style={{
          fontFamily: "system-ui,sans-serif",
          maxWidth: 740,
          margin: "0 auto",
          padding: "1.5rem 1rem",
        }}
      >
        <img
          src={certImg}
          alt="Certificate"
          style={{ width: "100%", display: "block", borderRadius: 4, marginBottom: 12 }}
        />
        <div style={{ display: "flex", gap: 10, justifyContent: "center", flexWrap: "wrap" }}>
          <button
            onClick={download}
            style={{
              background: G,
              color: "#fff",
              border: "none",
              borderRadius: 8,
              padding: "10px 24px",
              fontSize: 13,
              fontWeight: 600,
              cursor: "pointer",
            }}
          >
            ⬇ Download Certificate
          </button>
          <button
            onClick={onBack}
            style={{
              background: "none",
              border: "1px solid #ccc",
              borderRadius: 8,
              padding: "10px 18px",
              cursor: "pointer",
              fontSize: 13,
              color: GR,
            }}
          >
            Back to home
          </button>
        </div>
      </div>
    );
  return (
    <div
      style={{
        fontFamily: "system-ui,sans-serif",
        maxWidth: 480,
        margin: "0 auto",
        padding: "3rem 1rem",
        textAlign: "center",
      }}
    >
      <div style={{ fontSize: 36, marginBottom: 12 }}>🏆</div>
      <h2 style={{ fontSize: 20, fontWeight: 700, color: G, margin: "0 0 8px" }}>You did it!</h2>
      <p style={{ color: GR, marginBottom: 20, fontSize: 13 }}>
        All {TOTAL_MODULES} modules complete. Enter your name to generate your certificate.
      </p>
      <input
        value={name}
        onChange={(e) => setName(e.target.value)}
        placeholder="Your full name"
        style={{
          width: "100%",
          padding: "9px 13px",
          borderRadius: 7,
          border: "1px solid #ccc",
          fontSize: 14,
          marginBottom: 12,
          boxSizing: "border-box",
        }}
      />
      <button
        onClick={generate}
        disabled={!name.trim() || generating}
        style={{
          background: name.trim() ? G : "#ccc",
          color: "#fff",
          border: "none",
          borderRadius: 7,
          padding: "9px 24px",
          fontSize: 13,
          fontWeight: 600,
          cursor: name.trim() ? "pointer" : "not-allowed",
          width: "100%",
        }}
      >
        {generating ? "Generating..." : "Generate certificate"}
      </button>
      <button
        onClick={onBack}
        style={{
          marginTop: 8,
          background: "none",
          border: "none",
          color: GR,
          cursor: "pointer",
          fontSize: 12,
          display: "block",
          margin: "8px auto 0",
        }}
      >
        Back
      </button>
    </div>
  );
}

            </div>
          </div>
          <div style={{ fontSize: 15, fontWeight: 700, color: "#1a1a1a", marginBottom: 5 }}>
            Scoping Nuances
          </div>
          <div style={{ fontSize: 12, color: GR, marginBottom: 10, lineHeight: 1.5 }}>
            System-by-system gotchas for integration scoping
          </div>
          <div style={{ fontSize: 11, color: CY, fontWeight: 600 }}>
            7 systems · reference guide
          </div>
        </div>
      </div>
      {allDone ? (
        <div
          style={{
            background: GL,
            border: "1.5px solid " + G,
            borderRadius: 12,
            padding: "16px 20px",
            textAlign: "center",
          }}
        >
          <div style={{ fontSize: 24, marginBottom: 6 }}>🎉</div>
          <div style={{ fontWeight: 700, color: G, fontSize: 15, marginBottom: 4 }}>
            All training complete!
          </div>
          <button
            onClick={() => onSelect("cert")}
            style={{
              background: G,
              color: "#fff",
              border: "none",
              borderRadius: 8,
              padding: "9px 24px",
              fontSize: 13,
              fontWeight: 600,
              cursor: "pointer",
            }}
          >
            Get my certificate →
          </button>
        </div>
      ) : (
        <div
          style={{
            background: "#f8f8f6",
            borderRadius: 8,
            padding: "10px 14px",
            textAlign: "center",
          }}
        >
          <div style={{ fontSize: 12, color: GR }}>
            Complete all {TOTAL_MODULES} modules to unlock your certificate
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [completedMap, saveCompletedMap, loaded] = useStorage();
  const [page, setPage] = useState("home");
  const [activeT, setActiveT] = useState(null);
  const [activeM, setActiveM] = useState(null);
  const totalDone = TRAININGS.reduce(
    (s, t) => s + (completedMap[t.id] ? Object.keys(completedMap[t.id]).length : 0),
    0,
  );
  const allDone = totalDone === TOTAL_MODULES;
  if (!loaded)
    return (
      <div
        style={{
          fontFamily: "system-ui,sans-serif",
          padding: "2rem",
          textAlign: "center",
          color: GR,
          fontSize: 13,
        }}
      >
        Loading your progress...
      </div>
    );
  if (page === "scoping") return <ScopingPage onBack={() => setPage("home")} />;
  if (page === "cert") return <CertPage onBack={() => setPage("home")} allDone={allDone} />;
  if (page === "module" && activeM && activeT)
    return (
      <ModulePage
        m={activeM}
        trackTitle={activeT.title}
        onBack={() => setPage("training")}
        alreadyDone={!!(completedMap[activeT.id] && completedMap[activeT.id][activeM.id])}
        onComplete={() => {
          const u = {
            ...completedMap,
            [activeT.id]: { ...(completedMap[activeT.id] || {}), [activeM.id]: true },
          };
          saveCompletedMap(u);
          setPage("training");
        }}
      />
    );
  if (page === "training" && activeT)
    return (
      <TrainingHome
        t={activeT}
        onBack={() => setPage("home")}
        completedMap={completedMap}
        onModule={(m) => {
          setActiveM(m);
          setPage("module");
        }}
      />
    );
  return (
    <HomePage
      completedMap={completedMap}
      saveCompletedMap={saveCompletedMap}
      onSelect={(x) => {
        if (x === "cert") {
          setPage("cert");
          return;
        }
        if (x === "scoping") {
          setPage("scoping");
          return;
        }
        setActiveT(x);
        setPage("training");
      }}
    />
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
